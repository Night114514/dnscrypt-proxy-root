name: Manual Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Build module ZIP
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ZIP_NAME="dnscrypt-proxy-root-${TAG}.zip"
          
          zip -r "${ZIP_NAME}" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "*.md" \
            -x "tmp/*" \
            -x "run/*" \
            -x "logs/*" \
            -x "bin/*"
          
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_ENV
          ls -la "${ZIP_NAME}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "DNSCrypt Proxy Root ${{ steps.version.outputs.tag }}"
          body: |
            ## Release ${{ steps.version.outputs.tag }}
            
            ### Install
            Flash `${{ env.zip_name }}` via Magisk/KernelSU/APatch manager.
            
            ### Features
            - DNSCrypt-proxy with automatic updates
            - WebUI for KernelSU/APatch managers
            - iptables-based DNS redirection
            - Multi-architecture support (arm64/arm/x86_64/x86)
          files: |
            ${{ env.zip_name }}
            update.json
          draft: false
          prerelease: false
