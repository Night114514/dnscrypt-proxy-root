name: Auto Update dnscrypt-proxy

on:
  schedule:
    # Check for upstream updates every 1 month
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a new release even if versions match'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get upstream latest version
        id: upstream
        run: |
          LATEST=$(curl -fsSL https://api.github.com/repos/dnscrypt/dnscrypt-proxy/releases/latest | jq -r '.tag_name' )
          echo "version=${LATEST}" >> $GITHUB_OUTPUT
          echo "Upstream latest: ${LATEST}"

      - name: Get current module version
        id: current
        run: |
          CURRENT=$(grep '^version=' module.prop | cut -d= -f2)
          echo "version=${CURRENT}" >> $GITHUB_OUTPUT
          echo "Current module version: ${CURRENT}"

      - name: Compare versions
        id: compare
        run: |
          UPSTREAM="${{ steps.upstream.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          FORCE="${{ github.event.inputs.force_release }}"
          
          # Strip leading 'v' for comparison
          UPSTREAM_CLEAN="${UPSTREAM#v}"
          CURRENT_CLEAN="${CURRENT#v}"
          
          if [ "$FORCE" = "true" ] || [ "$UPSTREAM_CLEAN" != "$CURRENT_CLEAN" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Update needed: ${CURRENT} -> ${UPSTREAM}"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Already up to date: ${CURRENT}"
          fi

      - name: Update module.prop
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          RAW_VERSION="${{ steps.upstream.outputs.version }}"
          NEW_VERSION="${RAW_VERSION#v}"
          # Calculate new versionCode (YYYYMMDDNN format)
          NEW_CODE=$(date +%Y%m%d01)
          
          sed -i "s/^version=.*/version=${NEW_VERSION}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=${NEW_CODE}/" module.prop
          
          echo "Updated module.prop:"
          cat module.prop

      - name: Update update.json
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          RAW_VERSION="${{ steps.upstream.outputs.version }}"
          NEW_VERSION="${RAW_VERSION#v}"
          NEW_CODE=$(date +%Y%m%d01)
          REPO="${{ github.repository }}"
          
          cat > update.json << EOF
          {
            "version": "${NEW_VERSION}",
            "versionCode": ${NEW_CODE},
            "zipUrl": "https://github.com/${REPO}/releases/download/v${NEW_VERSION}/dnscrypt-proxy-root-v${NEW_VERSION}.zip",
            "changelog": "https://github.com/${REPO}/releases/tag/v${NEW_VERSION}"
          }
          EOF
          
          echo "Updated update.json:"
          cat update.json

      - name: Build module ZIP
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          RAW_VERSION="${{ steps.upstream.outputs.version }}"
          NEW_VERSION="${RAW_VERSION#v}"
          ZIP_NAME="dnscrypt-proxy-root-v${NEW_VERSION}.zip"
          
          # Create ZIP excluding dev files
          zip -r "${ZIP_NAME}" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "*.md" \
            -x "tmp/*" \
            -x "run/*" \
            -x "logs/*" \
            -x "bin/*"
          
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_ENV
          echo "new_version=v${NEW_VERSION}" >> $GITHUB_ENV
          
          ls -la "${ZIP_NAME}"

      - name: Commit version bump
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.prop update.json
          git commit -m "chore: bump to ${{ steps.upstream.outputs.version }}"
          git push

      - name: Create Release
        if: steps.compare.outputs.needs_update == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.new_version }}
          name: "DNSCrypt Proxy Root ${{ env.new_version }}"
          body: |
            ## Auto-update Release
            
            Upstream dnscrypt-proxy updated to **${{ steps.upstream.outputs.version }}**.
            
            ### Changes
            - Updated dnscrypt-proxy binary version
            - Module will auto-download the new binary on next boot
            
            ### Install
            Flash `${{ env.zip_name }}` via Magisk/KernelSU/APatch manager.
            
            ### Upstream Changelog
            See [dnscrypt-proxy releases](https://github.com/dnscrypt/dnscrypt-proxy/releases/tag/${{ steps.upstream.outputs.version }} )
          files: |
            ${{ env.zip_name }}
            update.json
          draft: false
          prerelease: false
